server:
  port: 8888
  address: 0.0.0.0

# 数据库配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/collegeems?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  main:
    allow-circular-references: true
  jpa:
    open-in-view: false

# 配置mybatis实体和xml映射
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.collegeems.entity
  #开启驼峰命名转换
  configuration:
      map-underscore-to-camel-case: true

#分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

